name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description:
          "Release tag (e.g. v20260324.1). Leave empty for a dry run."
        type: string
        required: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run check

      - name: Resolve release tag
        id: release-tag
        env:
          GH_REF: ${{ github.ref }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$GH_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG=""
          fi

          # Validate tag format if set
          if [[ -n "$TAG" && ! "$TAG" =~ ^v[0-9]{8}\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: '$TAG'. Expected v<YYYYMMDD>.<run> (e.g. v20260324.1)"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: inputs.tag != '' && !startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Build
        run: npm run build
        env:
          BUILD_ID:
            ${{ steps.release-tag.outputs.tag || format('dry-run-{0}',
            github.run_number) }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

      - name: Create release
        if: steps.release-tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          gh release create "$RELEASE_TAG" \
            --title "Release ${RELEASE_TAG}" \
            --notes "$(cat <<EOF
          ## ${RELEASE_TAG}

          **Timestamp**: ${TIMESTAMP}
          **Git SHA**: ${GITHUB_SHA}

          See \`manifest.json\` for build metadata and per-map schema versions.
          See \`checksums.sha256\` to verify asset integrity.
          EOF
          )" \
            --latest \
            dist/manifest.json \
            dist/checksums.sha256 \
            dist/maps/**/*.json
